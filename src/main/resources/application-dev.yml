server:
  port: 8087
spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  application:
    name: backend
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
mybatis:
  type-aliases-package: com.takoyakki.backend.domain.toDo.model, com.takoyakki.backend.domain.member.model # ★ 모델 패키지 추가
  mapper-locations: classpath*:mapper/**/*.xml
  config-location: classpath:/mybatis-config.xml